<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Netflix</h1>
            <button id="theme-toggle" aria-label="Alternar tema" aria-pressed="false"></button>
        </div>
    </header>
    <main>
        <section aria-labelledby="profile-selection">
            <h2 id="profile-selection">Quem está assistindo?</h2>
            <ul class="profiles">
                <li class="group">
                    <ol class="profile-list">
                        <li class="profile">
                            <a href="catalogo/catalogo.html">
                                <figure>
                                    <img src="ssets/perfil-1.png" alt="Boneco de argila no estilo Tim Burton, com olhos grandes e roupas em tons de roxo e verde">
                                    <figcaption>Jhonatan</figcaption>
                                </figure>
                            </a>
                        </li>
                        <li class="profile">
                            <a href="catalogo/catalogo.html">
                                <figure>
                                    <img src="assets/perfil-2.png" alt="Retrato de mulher steampunk em cidade industrial com dirigíveis e torres de relógio.">
                                    <figcaption>Letícia</figcaption>
                                </figure>
                            </a>
                        </li>
                        <li class="profile">
                            <a href="catalogo/catalogo.html">
                                <figure>
                                    <img src="assets/perfil-3.png" alt="Retrato de um menino viking em um ambiente nevado, segurando um machado e um escudo rúnico.">
                                    <figcaption>Kids</figcaption>
                                </figure>
                            </a>
                        </li>
                        <li class="profile">
                            <a href="catalogo/catalogo.html">
                                <figure>
                                    <img src="assets/perfil-4.png" alt="Retrato estilo Dalí com pele derretendo, relógios moles e símbolos oníricos em paisagem árida.">
                                    <figcaption>Convidado</figcaption>
                                </figure>
                            </a>
                        </li>
                    </ol>
                </li>
            </ul>
        </section>
    </main>
    <script src="js/index.js"></script>
</body>
</html>
